<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Acidic Rain Battleground</title>
    <style>
      html, body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background: #17110d;
      }
      #stage {
        position: absolute;
        top: 50%;
        left: 50%;
        width: 1280px;
        height: 720px;
        transform-origin: center center;
      }
      iframe {
        width: 1280px;
        height: 720px;
        border: 0;
        display: block;
      }
    </style>
  </head>
  <body>
    <div id="stage">
      <iframe id="game" src="./acidic_rain_battleground.html" title="Acidic Rain Battleground"></iframe>
    </div>
    <script>
      const stage = document.querySelector("#stage");
      const game = document.querySelector("#game");

      function fitStage() {
        const scale = Math.min(window.innerWidth / 1280, window.innerHeight / 720, 1);
        stage.style.transform = `translate(-50%, -50%) scale(${scale})`;
      }

      game.addEventListener("load", () => {
        const gameDocument = game.contentDocument;

        const link = gameDocument.createElement("link");
        link.rel = "stylesheet";
        link.href = "./layout_1280.css";
        gameDocument.head.appendChild(link);

        const progressionScript = gameDocument.createElement("script");
        progressionScript.src = "./tavern_progression.js";
        progressionScript.async = false;
        gameDocument.body.appendChild(progressionScript);

        const cardChangesScript = gameDocument.createElement("script");
        cardChangesScript.src = "./acidic_rain_requested_card_changes.js";
        cardChangesScript.async = false;
        gameDocument.body.appendChild(cardChangesScript);

        const seerRuntimeScript = gameDocument.createElement("script");
        seerRuntimeScript.src = "./acidic_rain_seer_runtime.js";
        seerRuntimeScript.async = false;
        gameDocument.body.appendChild(seerRuntimeScript);

        const poolScript = gameDocument.createElement("script");
        poolScript.src = "./acidic_rain_minion_pool_rules.js";
        poolScript.async = false;
        gameDocument.body.appendChild(poolScript);
      });

      window.addEventListener("resize", fitStage);
      fitStage();
    </script>
  </body>
</html>
