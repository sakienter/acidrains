<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Acidic Rain Battleground</title>
    <style>
      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background: #17110d;
      }

      #stage {
        position: fixed;
        inset: 0;
        width: 100vw;
        height: 100vh;
      }

      iframe {
        width: 100%;
        height: 100%;
        border: 0;
        display: block;
      }
    </style>
  </head>
  <body>
    <div id="stage">
      <iframe
        id="game"
        src="./acidic_rain_battleground.html?v=20260620-6"
        title="Acidic Rain Battleground"
      ></iframe>
    </div>

    <script>
      const ASSET_VERSION = "20260620-6";
      const game = document.querySelector("#game");

      function appendStyle(documentRef, href, marker) {
        const old = documentRef.querySelector(`link[data-index-style="${marker}"]`);
        if (old) old.remove();

        const link = documentRef.createElement("link");
        link.rel = "stylesheet";
        link.href = `${href}?v=${ASSET_VERSION}`;
        link.dataset.indexStyle = marker;
        documentRef.head.appendChild(link);
        return link;
      }

      function appendScript(documentRef, src, marker) {
        const old = documentRef.querySelector(`script[data-index-script="${marker}"]`);
        if (old) old.remove();

        const script = documentRef.createElement("script");
        script.src = `${src}?v=${ASSET_VERSION}`;
        script.async = false;
        script.dataset.indexScript = marker;
        documentRef.body.appendChild(script);
        return script;
      }

      function installFinalStyles(documentRef) {
        documentRef
          .querySelectorAll(
            "link[data-acid-card-rough-layout], " +
            "link[data-acid-card-layout-fix], " +
            'link[data-index-style="card-frame"], ' +
            'link[data-index-style="card-layout-fix"], ' +
            'link[data-index-style="viewport-fit"], ' +
            'link[data-index-style="card-polish"], ' +
            'link[data-index-style="board-card-fix"]'
          )
          .forEach(node => node.remove());

        appendStyle(
          documentRef,
          "./acidic_rain_card_rough_layout.css",
          "card-frame"
        );
        appendStyle(
          documentRef,
          "./acidic_rain_card_layout_fix.css",
          "card-layout-fix"
        );
        appendStyle(
          documentRef,
          "./acidic_rain_viewport_fit.css",
          "viewport-fit"
        );
        appendStyle(
          documentRef,
          "./acidic_rain_card_polish.css",
          "card-polish"
        );
        appendStyle(
          documentRef,
          "./acidic_rain_board_card_fix.css",
          "board-card-fix"
        );
      }

      function installFinalCardRuntime(documentRef) {
        appendScript(
          documentRef,
          "./acidic_rain_card_final_runtime.js",
          "final-card-runtime"
        );
      }

      game.addEventListener("load", () => {
        const gameDocument = game.contentDocument;
        if (!gameDocument) return;

        appendStyle(gameDocument, "./layout_1280.css", "base-layout");

        const progressionScript = appendScript(
          gameDocument,
          "./tavern_progression.js",
          "progression"
        );

        const loadPoolRules = () => {
          const poolScript = appendScript(
            gameDocument,
            "./acidic_rain_minion_pool_rules.js",
            "pool-rules"
          );

          poolScript.addEventListener("load", () => {
            installFinalStyles(gameDocument);
            installFinalCardRuntime(gameDocument);
            window.setTimeout(() => {
              installFinalStyles(gameDocument);
              installFinalCardRuntime(gameDocument);
            }, 250);
            window.setTimeout(() => {
              installFinalStyles(gameDocument);
              installFinalCardRuntime(gameDocument);
            }, 1000);
          }, { once: true });
        };

        progressionScript.addEventListener("load", loadPoolRules, { once: true });
        progressionScript.addEventListener("error", loadPoolRules, { once: true });

        installFinalStyles(gameDocument);
        installFinalCardRuntime(gameDocument);
        window.setTimeout(() => {
          installFinalStyles(gameDocument);
          installFinalCardRuntime(gameDocument);
        }, 1500);
      });
    </script>
  </body>
</html>
