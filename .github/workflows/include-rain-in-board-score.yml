name: Include Acidic Rain in board score

on:
  push:
    paths:
      - '.github/workflows/include-rain-in-board-score.yml'

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Include the fixed Acidic Rain slot in board scoring
        run: |
          python <<'PY'
          from pathlib import Path

          path = Path('acidic_rain_ui_score_spell_drag.js')
          text = path.read_text(encoding='utf-8')
          old = "if (!card || card.type === 'spell' || index < 2) return sum;"
          new = "if (!card || card.type === 'spell' || index < 1) return sum;"
          if old not in text:
              raise SystemExit('Expected board score condition was not found.')
          path.write_text(text.replace(old, new, 1), encoding='utf-8')

          Path('.github/workflows/include-rain-in-board-score.yml').unlink()
          PY

      - name: Commit score rule correction
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add acidic_rain_ui_score_spell_drag.js .github/workflows/include-rain-in-board-score.yml
          git commit -m 'Include Acidic Rain in end-turn board score'
          git push
