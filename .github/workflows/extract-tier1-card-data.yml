name: Cleanup Temporary Branches

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/extract-tier1-card-data.yml'

permissions:
  contents: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          show-progress: false
      - name: Delete temporary branches
        run: |
          git push origin --delete \
            extract-tier1-card-data \
            noop-existing-check \
            card-tests-temp \
            final-main-sync \
            cleanup-placeholder \
            do-not-use \
            stop-branch-test \
            accidental-branch-final \
            workflow-name-placeholder || true
