name: Extract Tier 1 Card Data

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/extract-tier1-card-data.yml'

permissions:
  contents: read

jobs:
  extract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Decode historical Excel card engine
        shell: bash
        run: |
          node <<'NODE'
          const { execFileSync } = require('node:child_process');
          const zlib = require('node:zlib');
          const fs = require('node:fs');

          const revision = 'b40013be93ca4395e94df0af006d460347ad3a02';
          const source = execFileSync(
            'git',
            ['show', `${revision}:acidic_rain_excel_cards.js`],
            { encoding: 'utf8', maxBuffer: 64 * 1024 * 1024 },
          );
          const match = source.match(/const b64="([^"]+)"/);
          if (!match) throw new Error('Compressed card payload was not found.');
          const decoded = zlib.gunzipSync(Buffer.from(match[1], 'base64')).toString('utf8');
          fs.writeFileSync('/tmp/decoded-card-engine.js', decoded);

          const names = [
            '野良猫', '威嚇するわんこ', 'ショールフィン', '船頭', '大道芸人',
            '甲板磨き', 'もりもり砂丘', '苔マン', 'ガチ預言者', '不吉な預言者',
          ];
          console.log(`DECODED_LENGTH=${decoded.length}`);
          for (const name of names) {
            console.log(`\n===== ${name} =====`);
            let start = 0;
            let found = false;
            while (true) {
              const index = decoded.indexOf(name, start);
              if (index < 0) break;
              found = true;
              console.log(decoded.slice(Math.max(0, index - 350), Math.min(decoded.length, index + 900)));
              start = index + name.length;
            }
            if (!found) console.log('NOT_FOUND');
          }
          NODE
      - name: Syntax check decoded engine
        run: node --check /tmp/decoded-card-engine.js
