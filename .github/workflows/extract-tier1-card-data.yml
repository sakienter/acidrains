name: Cleanup Verification Branches

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/extract-tier1-card-data.yml'

permissions:
  contents: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          show-progress: false
      - name: Delete temporary verification branches
        run: |
          git push origin --delete \
            verify-tier1-authoritative-pool \
            noop-cleanup-check \
            cleanup-temp-branches-trigger \
            final-cleanup-trigger \
            stop-creating-branches \
            branch-cleanup-list \
            cleanup-all-temp-branches || true
