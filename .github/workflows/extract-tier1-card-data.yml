name: Cleanup Turn Refresh Verification

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/extract-tier1-card-data.yml'

permissions:
  contents: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          show-progress: false
      - name: Delete temporary verification branch
        run: git push origin --delete verify-turn-start-refresh-rule || true
